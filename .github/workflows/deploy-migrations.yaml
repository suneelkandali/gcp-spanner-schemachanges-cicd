name: Execute Spanner Migrations

on:
  push:
    branches: [ "main" ]
    paths:
      - 'database/**'

jobs:
  run-migration:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: 'projects/947330204934/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'spanner-migrator@gcp-spannerdb-cicd.iam.gserviceaccount.com'

    - name: Download Cloud Spanner Liquibase Extension
      run: |
        mkdir -p plugins
        curl -L https://github.com/cloudspannerecosystem/liquibase-spanner/releases/download/4.27.0/liquibase-spanner-4.27.0-all.jar -o plugins/liquibase-spanner-all.jar
        chmod -R 755 plugins

    - name: Run Liquibase Migration
      run: |
        # Extract just the raw filename from the absolute runner path
        CREDS_FILENAME=$(basename "${{ steps.auth.outputs.credentials_file_path }}")
        
        # Execute the container with the relative changelog path mapping
        docker run --rm \
          -v "${{ github.workspace }}:/liquibase/workspace" \
          -v "${{ github.workspace }}/plugins:/liquibase/lib" \
          -e GOOGLE_APPLICATION_CREDENTIALS="/liquibase/workspace/${CREDS_FILENAME}" \
          liquibase/liquibase:4.27 \
          --changelog-file=database/changelog.xml \
          --driver=com.google.cloud.spanner.jdbc.JdbcDriver \
          --search-path=/liquibase/workspace \
          --url=jdbc:cloudspanner:/projects/gcp-spannerdb-cicd/instances/prod-like-instance/databases/target-app-db \
          update